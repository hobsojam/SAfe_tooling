        format: uuid
    pi_id:
      name: pi_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    iteration_id:
      name: iteration_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    feature_id:
      name: feature_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    story_id:
      name: story_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    objective_id:
      name: objective_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    risk_id:
      name: risk_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

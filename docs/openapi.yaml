      enum:
      - planning
      - active
      - closed
    FeatureStatus:
      type: string
      enum:
      - funnel
      - analyzing
      - backlog
      - implementing
      - done
    StoryStatus:
      type: string
      enum:
      - not_started
      - in_progress
      - done
      - accepted
    ROAMStatus:
      type: string
      enum:
      - unroamed
      - resolved
      - owned
      - accepted
      - mitigated
    DependencyStatus:
      type: string
      enum:
      - identified
      - resolved
      - owned
      - accepted
      - mitigated
    ART:
      type: object
      required:
      - id
      - name
      - team_ids

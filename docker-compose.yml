services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - safe_data:/data
    environment:
      SAFE_DB_PATH: /data/db.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  safe_data:

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - safe_data:/data
    environment:
      SAFE_DB_PATH: /data/db.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  safe_data:
